# nginx server block for the Roger Winter portfolio (static site).
# Served by nginxinc/nginx-unprivileged (non-root, listens on :8080).
# The host Caddy terminates TLS / Cloudflare mTLS and reverse-proxies here.

# Cache policy by file type. App code (.html/.jsx) always revalidates so a
# deploy is picked up immediately (filenames are not content-hashed); Astro's
# content-hashed /_astro/* bundles are immutable (cached a year); vendor
# libraries, images and fonts are cached for a week. The /_astro/ arm is first
# so hashed .js/.css there get `immutable`, not the generic one-week .js arm.
map $uri $rw_cache {
    default                                    "public, max-age=0, must-revalidate";
    ~*/_astro/                                 "public, max-age=31536000, immutable";
    ~*\.js$                                     "public, max-age=604800";
    ~*\.(?:png|webp|jpe?g|gif|svg|ico|woff2?)$  "public, max-age=604800";
}

server {
    listen        8080;
    listen        [::]:8080;
    server_name   _;
    root          /usr/share/nginx/html;
    index         index.html;
    charset       utf-8;
    server_tokens off;

    # Compression at the origin (Cloudflare/Caddy also compress at the edge).
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript text/javascript
                    application/json image/svg+xml application/xml;

    # Security + cache headers on every response. CSP is scoped to exactly what
    # the site loads: self + the Twitch player iframe (Pricey page). Fonts are
    # self-hosted under /vendor/fonts, so no Google Fonts origins are needed.
    # script-src is hash-locked: NO 'unsafe-inline', NO 'unsafe-eval'. The three
    # sha256 hashes are the only inline scripts the built pages emit — the pre-paint
    # theme bootstrap (every page) and Astro's island-hydration runtimes (client:only
    # + client:visible). 'self' covers the content-hashed /_astro/* module imports.
    # tests/csp-hashes.test.js recomputes these from the built dist/ and fails CI if
    # they drift (e.g. an Astro upgrade changes the runtime, or the bootstrap is
    # edited) — so a deploy can't ship a CSP that would silently block hydration.
    # style-src keeps 'unsafe-inline' for Astro's scoped styles + the inline reset.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=(), browsing-topics=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-zszqF0CpcEZlAUsZspK7M3awGtPSw6kmTyeindoeCwM=' 'sha256-JEFsP7rVHf95KYKkFWCnDDsGS1bEya2F9DGDfK/wVlo=' 'sha256-Jz4XDAN4f076pEj8cOt8mEdISulquB3CBdxFvEpSSyc='; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-src https://player.twitch.tv; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header Cache-Control          $rw_cache always;

    # Liveness probe for Docker/Caddy.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Never serve dotfiles.
    location ~ /\. { deny all; }

    location / {
        try_files $uri $uri/ =404;
    }
}
