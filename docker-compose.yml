# Roger Winter portfolio — production stack.
# Static site, bound to loopback only; the host Caddy (shared with other sites)
# terminates TLS + Cloudflare Authenticated Origin Pull and proxies in.
# Mirrors the sheet-llm deploy pattern (127.0.0.1 bind, restart, log rotation).
#
# Local:   docker compose up -d --build
# Server:  PORTFOLIO_IMAGE=ghcr.io/realrogerwinter/rwinter-dev-portfolio@sha256:... docker compose up -d
services:
  web:
    image: ${PORTFOLIO_IMAGE:-rwinter-portfolio:local}
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:8080"        # loopback ONLY — never 0.0.0.0 (sheet-llm owns 3000)
    # Hardening: nothing here needs to write to the image filesystem.
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 4s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }
