version: 2.1

# ─────────────────────────────────────────────────────────────────────────────
# Roger Winter portfolio — CI/CD
#
#   lint  ─┐
#   test  ─┼─▶ build_and_push ─▶ hold (manual) ─▶ deploy      (build/deploy: main only)
#   verify─┘
#
#   lint            HTML lint (htmlhint)
#   test            vitest suite, timing-split across parallel nodes;
#                   JUnit stored → CircleCI Test Insights + flaky-test detection
#   verify          build the image, run it, smoke-test every page/asset/header,
#                   and scan the image for baked-in secrets
#   build_and_push  build, re-scan for secrets, then push to GHCR pinned by sha256
#   hold            MANUAL APPROVAL — gates every production deploy
#   deploy          SSH the pinned digest to the VPS forced-command
#
# Contexts/keys (see docs/ci-cd.md): ghcr-push {GHCR_USER,GHCR_TOKEN},
# deploy {VPS_HOST, VPS_KNOWN_HOSTS} + the rwinter-deploy@VPS project SSH key.
# VPS_HOST is the deploy target (the origin host); kept in the context, not the
# repo, so the public config never carries the origin address.
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  image_name:
    type: string
    default: "ghcr.io/realrogerwinter/rwinter-dev-portfolio"

executors:
  vm:
    machine:
      image: ubuntu-2404:current
  node:
    docker:
      - image: cimg/node:20.18
  deployer:
    docker:
      - image: cimg/base:current
  playwright:
    docker:
      # Pinned to the @playwright/test version in package.json so the bundled
      # Chromium matches the one that generates the committed baselines.
      - image: mcr.microsoft.com/playwright:v1.49.1-noble

commands:
  scan_image_for_secrets:
    description: "Fail the build if the image contains secret-like content (whole filesystem, broad token shapes)."
    parameters:
      image:
        type: string
    steps:
      - run:
          name: Scan image for baked-in secrets
          command: |
            PAT='-----BEGIN [A-Z ]*PRIVATE KEY-----|ghp_[A-Za-z0-9]{36}|github_pat_[0-9A-Za-z_]{40,}|gh[osur]_[A-Za-z0-9]{36}|sk-ant-[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}|CF_API_TOKEN|xox[baprs]-[0-9A-Za-z-]+'
            HITS=$(docker run --rm --user 0 --entrypoint sh << parameters.image >> -c "grep -rIlE -e \"$PAT\" / --exclude-dir=proc --exclude-dir=sys --exclude-dir=dev 2>/dev/null" || true)
            if [ -n "$HITS" ]; then echo "FAIL — secret-like content found in image:"; echo "$HITS"; exit 1; fi
            echo "OK — image is free of secret-like content"

jobs:
  lint:
    executor: node
    steps:
      - checkout
      - restore_cache:
          keys: ["npm-v1-{{ checksum \"package-lock.json\" }}"]
      - run: npm ci
      - save_cache:
          key: "npm-v1-{{ checksum \"package-lock.json\" }}"
          paths: ["~/.npm"]
      - run:
          name: Lint HTML
          command: npm run lint

  test:
    executor: node
    parallelism: 2
    steps:
      - checkout
      - restore_cache:
          keys: ["npm-v1-{{ checksum \"package-lock.json\" }}"]
      - run: npm ci
      - run:
          name: Run tests (timing-split across parallel nodes)
          command: |
            mkdir -p test-results
            TESTFILES=$(circleci tests glob "tests/**/*.test.js" | circleci tests split --split-by=timings)
            if [ -z "$TESTFILES" ]; then echo "no tests assigned to this node"; exit 0; fi
            echo "this node runs:"; echo "$TESTFILES"
            CI=1 npx vitest run $TESTFILES
      - store_test_results:    # JUnit → Test Insights, flaky detection, timing data
          path: test-results
      - store_artifacts:
          path: test-results

  visual:
    executor: playwright
    steps:
      - checkout
      - run:
          name: Install deps
          command: npm ci
      - run:
          name: Visual harness (render-smoke + oracle self-test)
          # Environment-independent specs only. The pixel-parity comparison
          # (pages.spec.mjs) is the authoring-environment gate; see
          # tests/visual/README.md.
          command: |
            mkdir -p test-results
            npm run test:visual:ci
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results

  verify:
    executor: vm
    steps:
      - checkout
      - run:
          name: Build image
          command: docker build -t rwinter-portfolio:ci .
      - run:
          name: Run container (loopback)
          command: docker run -d --name rwp -p 127.0.0.1:3001:8080 rwinter-portfolio:ci
      - run:
          name: Wait for health
          command: |
            for i in $(seq 1 30); do
              curl -fsS http://127.0.0.1:3001/healthz >/dev/null 2>&1 && exit 0
              sleep 1
            done
            echo "container did not become healthy"; docker logs rwp; exit 1
      - run:
          name: Smoke test (pages, assets, headers, 404s)
          command: python3 scripts/smoke.py http://127.0.0.1:3001
      - scan_image_for_secrets:
          image: "rwinter-portfolio:ci"

  build_and_push:
    executor: vm
    steps:
      - checkout
      - run:
          name: Login to GHCR
          command: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
      - run:
          name: Build image (tagged for scan + push)
          command: |
            IMG="<< pipeline.parameters.image_name >>"
            docker build -t "$IMG:$CIRCLE_SHA1" -t "$IMG:latest" -t rwinter-portfolio:ci .
      - scan_image_for_secrets:    # gate the EXACT artifact before it reaches public GHCR
          image: "rwinter-portfolio:ci"
      - run:
          name: Push (sha + latest), capture digest
          command: |
            IMG="<< pipeline.parameters.image_name >>"
            docker push "$IMG:$CIRCLE_SHA1"
            docker push "$IMG:latest"
            # Resolve the pushed manifest digest from the registry and build the
            # canonical GHCR ref. RepoDigests[0] is unreliable here: the local
            # `rwinter-portfolio:ci` scan tag also lands in RepoDigests, which is
            # what made the first hardened deploy send a non-GHCR ref.
            SHA="$(docker buildx imagetools inspect "$IMG:$CIRCLE_SHA1" --format '{{.Manifest.Digest}}')"
            case "$SHA" in sha256:*) : ;; *) echo "ERROR: bad digest '$SHA'"; exit 1 ;; esac
            echo "${IMG}@${SHA}" > image-digest.txt
            echo "pushed $(cat image-digest.txt)"
      - persist_to_workspace:
          root: .
          paths: [image-digest.txt]

  deploy:
    executor: deployer
    steps:
      - attach_workspace:
          at: .
      # The rwinter-deploy@VPS private key added in CircleCI project settings.
      - add_ssh_keys:
          fingerprints:
            - "64:02:15:67:16:06:56:f4:a5:27:8c:5b:3b:cc:cb:7a"
      - run:
          name: Pin VPS host key
          command: |
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            echo "$VPS_KNOWN_HOSTS" | base64 -d >> ~/.ssh/known_hosts
            chmod 600 ~/.ssh/known_hosts
      - run:
          name: Trigger forced-command deploy (digest only)
          command: |
            DIGEST="$(cat image-digest.txt)"
            echo "deploying $DIGEST"
            ssh rwinter-deploy@${VPS_HOST} "$DIGEST"

workflows:
  build-test-deploy:
    jobs:
      - lint
      - test
      - visual
      - verify
      - build_and_push:
          context: ghcr-push
          requires: [lint, test, visual, verify]
          filters:
            branches:
              only: main
      - hold:
          type: approval
          requires: [build_and_push]
          filters:
            branches:
              only: main
      - deploy:
          context: deploy
          requires: [hold]
          filters:
            branches:
              only: main
